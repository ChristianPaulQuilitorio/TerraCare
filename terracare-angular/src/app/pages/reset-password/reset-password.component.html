<div class="auth-container">
  <h2>Reset Password</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-group">
      <label for="password">New Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Enter new password" />
      <div class="hint" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">
        Password must be at least 6 characters.
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Confirm new password" />
      <div class="hint" *ngIf="passwordMismatch">Passwords do not match.</div>
    </div>

    <button type="submit" [disabled]="!canSubmit">{{ isLoading ? 'Updating…' : 'Update Password' }}</button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
  </form>

  <p class="back-link"><a routerLink="/login">Back to Login</a></p>
</div>
